<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="robots" content="noindex, nofollow">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488"> 
    <title>오키나와 가족 여행 - 관광지 & 쇼핑</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8FAFC; color: #334155; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        button:active, a:active { transform: scale(0.98); }
        .top-btn { position: fixed; bottom: 24px; right: 24px; z-index: 50; opacity: 0; transform: translateY(20px); transition: all 0.3s ease; pointer-events: none; }
        .top-btn.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        
        /* 탭 버튼 */
        .filter-btn { border: 1px solid #E2E8F0; color: #64748B; background: white; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; white-space: nowrap; transition: all 0.2s; }
        .filter-btn.active { background-color: #0D9488; color: white; border-color: #0D9488; } /* Teal-600 */

        /* 카드 스타일 */
        .place-item {
            background-color: white;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            height: 100%;
        }
        .place-item:active { transform: scale(0.98); background-color: #F0FDFA; }

        /* 뱃지 스타일 */
        .badge-tag { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 2px; }
        .bg-planned { background-color: #EFF6FF; color: #2563EB; } /* 일정포함: 파랑 */
        .bg-option { background-color: #F1F5F9; color: #64748B; } /* 추천옵션: 회색 */
        
        /* 지역별 뱃지 색상 */
        .tag-north { color: #059669; background-color: #ECFDF5; border: 1px solid #A7F3D0; }
        .tag-central { color: #EA580C; background-color: #FFF7ED; border: 1px solid #FED7AA; }
        .tag-south { color: #2563EB; background-color: #EFF6FF; border: 1px solid #BFDBFE; }

        /* 면세 뱃지 */
        .badge-taxfree { 
            background-color: #FFF1F2; color: #BE123C; border: 1px solid #FECDD3; 
            font-size: 10px; font-weight: 800; padding: 3px 6px; border-radius: 4px; 
            display: inline-block; margin-top: 6px;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col pb-safe">

    <header class="bg-teal-600 text-white pt-10 pb-6 px-5 relative overflow-hidden shadow-xl z-20">
        <div class="max-w-4xl mx-auto relative z-10">
            <div class="flex justify-between items-start mb-6 mt-8">
                <div class="flex-1 pr-2">
                    <span class="text-teal-200 font-bold text-xs mb-1 block">어디로 갈까?</span>
                    <h1 class="text-2xl md:text-3xl font-black leading-tight tracking-tight">
                        관광지 &<br>
                        <span class="text-yellow-300">쇼핑</span> <span class="text-teal-200">핫플레이스</span>
                    </h1>
                    <p class="text-teal-100 text-xs mt-2 flex items-center gap-1">
                        <i data-lucide="map-pin" class="w-3 h-3"></i> 지역별 명소 및 맵코드 완벽 정리
                    </p>
                </div>
            </div>
        </div>
        <div class="absolute -right-4 -bottom-16 w-48 h-48 bg-teal-500 rounded-full opacity-30 blur-3xl"></div>
    </header>

    <nav id="global-nav" class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-slate-200 shadow-sm"></nav>

    <main class="flex-grow max-w-4xl mx-auto w-full px-5 py-6 pb-32 relative">

        <div class="bg-slate-800 text-white p-4 rounded-xl shadow-sm mb-6 flex items-center gap-3">
            <div class="bg-white/10 p-2 rounded-full"><i data-lucide="receipt" class="w-5 h-5 text-yellow-400"></i></div>
            <div class="text-xs leading-relaxed">
                <span class="text-yellow-400 font-bold">TAX FREE Tip:</span><br>
                세금 포함 <span class="font-bold underline">5,500엔 이상</span> 구매 시 면세 가능.<br>
                반드시 <span class="font-bold text-yellow-200">여권 원본</span>을 지참하세요!
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-4 mb-2 sticky top-[57px] z-40 bg-[#F8FAFC] pt-2">
            <button onclick="filterContent('all')" class="filter-btn active" id="btn-all">전체</button>
            <button onclick="filterContent('north')" class="filter-btn" id="btn-north">🌊 북부</button>
            <button onclick="filterContent('central')" class="filter-btn" id="btn-central">🎡 중부</button>
            <button onclick="filterContent('south')" class="filter-btn" id="btn-south">✈️ 남부</button>
            <button onclick="filterContent('mall')" class="filter-btn" id="btn-mall">🛍️ 쇼핑몰</button>
            <button onclick="filterContent('gift')" class="filter-btn" id="btn-gift">🎁 기념품</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="content-area">
            </div>

        <div id="global-apps-container" class="mt-8 pt-6 border-t border-slate-200 pb-10"></div>

    </main>

    <button onclick="scrollToTop()" id="top-btn" class="top-btn bg-teal-600 text-white p-3 rounded-full shadow-xl hover:bg-teal-700 transition-colors">
        <i data-lucide="arrow-up" class="w-6 h-6"></i>
    </button>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-full shadow-xl flex items-center gap-2 opacity-0 transition-opacity duration-300 pointer-events-none z-[100]">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-green-400"></i>
        <span class="font-bold text-sm">맵코드가 복사되었습니다!</span>
    </div>

    <script type="module" src="common.js"></script>
    <script src="//instant.page/5.2.0" type="module" integrity="sha384-jnZyxPjiipYXnSU0ygqeac2q7CVYMbh84GO0uHuyrYlp+WvTffKiknkIODCo572M"></script>

    <script>
        const places = [
            // --- 북부 (North) ---
            { region: 'north', category: 'sightseeing', name: '츄라우미 수족관', desc: '거대한 수조의 고래상어는 필수 코스.', mapcode: '553 075 797', mapUrl: 'Okinawa Churaumi Aquarium', status: 'planned' },
            { region: 'north', category: 'sightseeing', name: '만좌모', desc: '코끼리 얼굴 모양의 침식 절벽.', mapcode: '206 312 097*55', mapUrl: 'Manzamo', status: 'planned' },
            { region: 'north', category: 'sightseeing', name: '코우리 대교 & 섬', desc: '에메랄드빛 바다 위를 달리는 드라이브.', mapcode: '485 693 485*06', mapUrl: 'Kouri Bridge', status: 'option' },
            { region: 'north', category: 'sightseeing', name: '나고 파인애플 파크', desc: '귀여운 무인 카트를 타고 농장 탐험.', mapcode: '206 716 467*82', mapUrl: 'Nago Pineapple Park', status: 'option' },
            { region: 'north', category: 'sightseeing', name: '네오 파크 오키나와', desc: '새와 동물을 가까이서 만나는 곳.', mapcode: '206 653 842*55', mapUrl: 'Neo Park Okinawa', status: 'option' },

            // --- 중부 (Central) ---
            { region: 'central', category: 'sightseeing', name: '아메리칸 빌리지', desc: '숙소 앞! 쇼핑, 맛집, 야경의 랜드마크.', mapcode: '33 526 451*20', mapUrl: 'American Village Okinawa', status: 'planned' },
            { region: 'central', category: 'sightseeing', name: '동남식물원', desc: '이국적인 야자수와 귀여운 동물 체험.', mapcode: '33 742 510*74', mapUrl: 'Southeast Botanical Gardens', status: 'planned' },
            { region: 'central', category: 'sightseeing', name: '잔파곶 등대', desc: '웅장한 절벽과 하얀 등대.', mapcode: '1005 685 326*43', mapUrl: 'Cape Zanpa Lighthouse', status: 'option' },
            { region: 'central', category: 'sightseeing', name: '류큐무라', desc: '오키나와 전통 가옥과 문화 체험.', mapcode: '206 033 065*25', mapUrl: 'Ryukyu Mura', status: 'option' },
            { region: 'central', category: 'sightseeing', name: '낚고 찾아내는 모험의 나라', desc: '비 오는 날에도 즐기기 좋은 실내 낚시 & 보물찾기 체험.', mapcode: '206 069 262*13', mapUrl: '釣って見つけるぼうけんの国 沖縄', status: 'option' },
            
            // 중부 쇼핑 & 기념품 (다중 분류)
            { region: 'central', category: 'mall', name: '이온몰 라이카무', desc: '오키나와 최대 규모 리조트형 몰.', mapcode: '33 530 406*45', mapUrl: 'AEON MALL Okinawa Rycom', status: 'planned', taxfree: '1F 면세카운터 / 각 매장' },
            { region: 'central', category: 'mall', name: '파르코 시티', desc: '나하 인근, 바다가 보이는 최신 몰.', mapcode: '33 341 124*74', mapUrl: 'San-A Urasoe West Coast PARCO CITY', status: 'option', taxfree: '1F 그린존 통합 카운터' },
            { region: 'central', category: 'gift', name: '메가 돈키호테 기노완', desc: '국제거리보다 주차가 편리한 매장.', mapcode: '33 434 024*44', mapUrl: 'MEGA Don Quijote Ginowan', status: 'planned', taxfree: '면세 전용 계산대' },
            { region: 'central', category: 'gift', name: '오카시고텐 (요미탄)', desc: '자색고구마 타르트 원조 (선물 추천).', mapcode: '206 315 289*63', mapUrl: 'Okashigoten Yomitan Main Shop', status: 'option', taxfree: '면세 전용 카운터' },

            // --- 남부 (South) ---
            { region: 'south', category: 'sightseeing', name: '우미카지 테라스', desc: '공항 근처, 비행기가 보이는 하얀 테라스.', mapcode: '33 002 602*06', mapUrl: 'Senagajima Umikaji Terrace', status: 'planned' },
            { region: 'south', category: 'sightseeing', name: '오키나와 월드', desc: '동양 최대 종유동굴과 전통 공연.', mapcode: '232 495 330*83', mapUrl: 'Okinawa World', status: 'option' },
            { region: 'south', category: 'sightseeing', name: '국제거리 (주차장)', desc: '나하 최대 번화가. (목적지: 마키시 제3 주차장)', mapcode: '33 157 403*33', mapUrl: 'テクニカルパーク牧志第3', status: 'planned' },
            { region: 'south', category: 'sightseeing', name: '슈리성 공원', desc: '류큐 왕국의 역사가 깃든 세계문화유산.', mapcode: '33 161 526*66', mapUrl: 'Shurijo Castle Park', status: 'option' },

            // 남부 쇼핑 & 기념품
            { region: 'south', category: 'mall', name: '아시비나 아울렛', desc: '명품 브랜드 및 스포츠 의류 아울렛.', mapcode: '232 544 452*22', mapUrl: 'Okinawa Outlet Mall Ashibinaa', status: 'option', taxfree: '각 매장 계산대' },
            { region: 'south', category: 'mall', name: '이아스 오키나와', desc: '수족관이 있는 최신 복합 시설.', mapcode: '232 543 400*25', mapUrl: 'iias Okinawa Toyosaki', status: 'planned', taxfree: '매장별 상이' },
            { region: 'south', category: 'gift', name: '만화창고 (나하점)', desc: '피규어, 게임 등 보물찾기 중고샵.', mapcode: '33 064 552*55', mapUrl: 'Manga Souko Naha', status: 'option', taxfree: '면세 가능' },
            { region: 'south', category: 'gift', name: '야치문 거리', desc: '전통 도자기 공방 거리.', mapcode: '33 158 123*44', mapUrl: 'Tsuboya Yachimun Street', status: 'option', taxfree: '매장별 상이' },
        ];

        function renderPlaces(filterKey) {
            const container = document.getElementById('content-area');
            container.innerHTML = '';

            const filtered = places.filter(place => {
                if (filterKey === 'all') return true;
                
                // 지역 필터 (north, central, south)
                if (['north', 'central', 'south'].includes(filterKey)) {
                    return place.region === filterKey;
                }
                // 카테고리 필터 (mall, gift)
                if (['mall', 'gift'].includes(filterKey)) {
                    return place.category === filterKey;
                }
                return false;
            });

            filtered.forEach(place => {
                // 지역 뱃지 렌더링
                let regionLabel = '';
                let regionClass = '';
                if(place.region === 'north') { regionLabel = '북부'; regionClass = 'tag-north'; }
                else if(place.region === 'central') { regionLabel = '중부'; regionClass = 'tag-central'; }
                else { regionLabel = '남부'; regionClass = 'tag-south'; }

                // 일정 상태 뱃지
                let statusBadge = place.status === 'planned' 
                    ? `<span class="badge-tag bg-planned">🗓️ 일정포함</span>` 
                    : `<span class="badge-tag bg-option">✨ 추천옵션</span>`;

                // 면세 뱃지
                let taxFreeBadge = place.taxfree 
                    ? `<span class="badge-taxfree"><i data-lucide="receipt" class="w-3 h-3"></i> ${place.taxfree}</span>` 
                    : '';

                // [수정됨] 공식 구글맵 검색 URL 포맷 적용
                const html = `
                    <div class="place-item" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.mapUrl)}', '_blank')">
                        <div>
                            <div class="flex justify-between items-start mb-1">
                                <div class="flex gap-1">
                                    <span class="badge-tag ${regionClass}">${regionLabel}</span>
                                    ${statusBadge}
                                </div>
                            </div>
                            <h3 class="font-bold text-slate-800 text-sm mt-1">${place.name}</h3>
                            <p class="text-xs text-slate-500 mt-1 line-clamp-2">${place.desc}</p>
                            ${taxFreeBadge}
                        </div>
                        <div class="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between gap-2">
                            <button class="flex-1 bg-slate-50 border border-slate-200 text-slate-600 text-[11px] font-bold py-2 rounded-lg hover:bg-slate-100 transition-colors" onclick="event.stopPropagation(); copyToClipboard('${place.mapcode}')">
                                MC: ${place.mapcode}
                            </button>
                            <span class="text-[11px] font-bold text-blue-500 flex items-center gap-1">
                                구글맵 <i data-lucide="arrow-up-right" class="w-3 h-3"></i>
                            </span>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            
            if (window.lucide) window.lucide.createIcons();
        }

        function filterContent(key) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');
            renderPlaces(key);
        }

        // 초기 렌더링
        renderPlaces('all');
    </script>

</body>
</html>
</html>
